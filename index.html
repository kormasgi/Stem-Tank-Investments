<!DOCTYPE html>
<html>
<head>
  <title>STEM Tank Invest</title>
</head>
<body>

<h1>🏆 Leaderboard</h1>
<div id="leaderboard"></div>

<h2>Your Balance: $<span id="balance">0</span></h2>

<p id="error" style="color:red;"></p>

<hr>

<h2>Make Investment</h2>

<label>Choose Group:</label>
<select id="groupSelect">
  <option value="A">Group A</option>
  <option value="B">Group B</option>
  <option value="C">Group C</option>
</select>

<br><br>

<label>Amount:</label>
<select id="amountInput">
  <option value="100000">100,000</option>
  <option value="200000">200,000</option>
  <option value="500000">500,000</option>
</select>

<br><br>

<button onclick="investFromInput()">Invest</button>

<div id="loginScreen" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:1000;
">
  <h1>Enter Your Code</h1>
  <input id="codeInput" placeholder="Enter code" style="font-size:20px; padding:10px;">
  <br><br>
  <button onclick="login()">Enter</button>
  <p id="loginError" style="color:red;"></p>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
