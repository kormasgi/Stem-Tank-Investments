<!DOCTYPE html>
<html>
<head>
  <title>STEM Tank Investments</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" class="app">
  <h1>STEM Tank Investments</h1>

  <h2>Your Balance: $<span id="balance">0</span></h2>
  <p id="error" style="color:red;"></p>

  <h2 id="currentGroup"></h2>

  <button onclick="invest(100000)">Invest 100k</button>
  <button onclick="invest(200000)">Invest 200k</button>
  <button onclick="invest(500000)">Invest 500k</button>
  <br>
  <br>
  <button onclick="window.location.reload();">Done!</button>
</div>

<div id="groupScreen" class="groupScreen">
  <h1>Select Group</h1>
  <button onclick="selectGroup('NeoDarwinAI')">NeoDarwinAI</button>
  <button onclick="selectGroup('Robo-Paw Puppy')">Robo-Paw Puppy</button>
  <button onclick="selectGroup('Striker Matrix')">Striker Matrix</button>
  <button onclick="selectGroup('Scream Shack Levity Loop')">Scream Shack Levity Loop</button>
  <button onclick="selectGroup('Buzzer Beater Board')">Buzzer Beater Board</button>
  <button onclick="selectGroup('FlickTeksportz')">FlickTeksportz</button>
  <button onclick="selectGroup('Bee Drone')">Bee Drone</button>
  <button onclick="selectGroup('AllWays Able AI')">AllWays Able AI</button>
  <button onclick="selectGroup('Focus Floor')">Focus Flow</button>
  <button onclick="selectGroup('Mission: Odyssey')">Mission: Odyssey</button>
  <button onclick="selectGroup('GlowForce Universe')">GlowForce Universe</button>
  <button onclick="selectGroup('Tesla Band')">Tesla Band</button>
  <button onclick="selectGroup('Bionic Buddy')">Bionic Buddy</button>
  <button onclick="selectGroup('GlowTerra')">GlowTerra</button>
  <button onclick="selectGroup('BigButton Motors')">BigButton Motors</button>
  <button onclick="selectGroup('BioFeedback Broadcast')">BioFeedback Broadcast</button>
  <button onclick="selectGroup('Smarties Bites')">Smarties Bites</button>
  <button onclick="selectGroup('UmpBot')">UmpBot</button>
  <button onclick="selectGroup('KronosAI')">KronosAI</button>
  <button onclick="selectGroup('FocusFly Floor')">FocusFly Floor</button>
  <button onclick="selectGroup('VelociVector Volt')">VelociVector Volt</button>
</div>

<div id="loginScreen" class="loginScreen">
  <h1>Enter Code</h1>
  <input id="codeInput" placeholder="Code" class="codeInput" autocomplete="off">
  <br><br>
  <button onclick="login()" class="codeEnter">Enter</button>
  <p id="loginError" style="color:red;"></p>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
